host: localhost:4500
info:
  contact:
    email: support@pravara.io
    name: PravaraMES Team
    url: https://github.com/madfam-org/pravara-mes
  description: |-
    Cloud-native Manufacturing Execution System API for phygital fabrication.
    Provides endpoints for order management, task/Kanban board operations,
    machine control, telemetry, quality management, and real-time updates.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: PravaraMES API
  version: 1.0.0
paths:
  /admin/billing/tenants/{id}/usage:
    get:
      description: Returns usage summary for a specific tenant, admin access required
      parameters:
      - description: Tenant ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Start date (YYYY-MM-DD), defaults to current month start
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to today
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Usage summary
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid date format or range
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get tenant usage (admin)
      tags:
      - billing
  /billing/usage:
    get:
      description: Returns aggregated usage metrics for the current tenant within
        a date range
      parameters:
      - description: Start date (YYYY-MM-DD), defaults to current month start
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to today
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Usage summary
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid date format or range
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get tenant usage summary
      tags:
      - billing
  /billing/usage/daily:
    get:
      description: Returns day-by-day usage metrics for the current tenant
      parameters:
      - description: Start date (YYYY-MM-DD), defaults to current month start
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to today
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Daily usage breakdown
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid date format or range
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get daily usage breakdown
      tags:
      - billing
  /health:
    get:
      description: Returns detailed health status including database connection and
        runtime metrics
      produces:
      - application/json
      responses:
        "200":
          description: System healthy
          schema:
            $ref: '#/definitions/internal_api.HealthResponse'
        "503":
          description: System degraded
          schema:
            $ref: '#/definitions/internal_api.HealthResponse'
      summary: Comprehensive health check
      tags:
      - health
  /health/live:
    get:
      description: Returns alive status for container health check
      produces:
      - application/json
      responses:
        "200":
          description: alive
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Kubernetes liveness probe
      tags:
      - health
  /health/ready:
    get:
      description: Returns ready status when database connection is healthy
      produces:
      - application/json
      responses:
        "200":
          description: ready
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: not ready
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Kubernetes readiness probe
      tags:
      - health
  /machines:
    get:
      description: Returns a paginated list of machines with optional filtering by
        status and type
      parameters:
      - default: 50
        description: Number of results per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - description: Filter by machine status
        enum:
        - online
        - offline
        - busy
        - maintenance
        - error
        in: query
        name: status
