info:
  contact:
    email: support@pravara.io
    name: PravaraMES Team
    url: https://github.com/madfam-org/pravara-mes
  description: |-
    Cloud-native Manufacturing Execution System API for phygital fabrication.
    Provides endpoints for order management, task/Kanban board operations,
    machine control, telemetry, quality management, and real-time updates.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: PravaraMES API
  version: 1.0.0
paths:
  /admin/billing/tenants/{id}/usage:
    get:
      description: Returns usage summary for a specific tenant, admin access required
      parameters:
      - description: Tenant ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Start date (YYYY-MM-DD), defaults to current month start
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to today
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Usage summary
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid date format or range
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get tenant usage (admin)
      tags:
      - billing
  /billing/usage:
    get:
      description: Returns aggregated usage metrics for the current tenant within
        a date range
      parameters:
      - description: Start date (YYYY-MM-DD), defaults to current month start
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to today
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Usage summary
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid date format or range
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get tenant usage summary
      tags:
      - billing
  /billing/usage/daily:
    get:
      description: Returns day-by-day usage metrics for the current tenant
      parameters:
      - description: Start date (YYYY-MM-DD), defaults to current month start
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD), defaults to today
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Daily usage breakdown
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid date format or range
