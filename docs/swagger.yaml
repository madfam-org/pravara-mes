      - application/json
      responses:
        "201":
          description: Import successful
          schema:
            properties:
              bom_items:
                items:
                  type: object
                type: array
              model_url:
                type: string
              product_definition:
                type: object
              work_instruction:
                type: object
            type: object
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "502":
          description: Upstream service error
      security:
      - BearerAuth: []
      summary: Import hyperobject from Yantra4D
      tags:
      - yantra4d
  /import/yantra4d/preview:
    get:
      description: Fetches the Yantra4D manifest and returns a preview of the MES
        objects that would be created without writing to the database.
      parameters:
      - description: Yantra4D project slug
        in: query
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Preview data
          schema:
            properties:
              manifest:
                type: object
              preview:
                properties:
                  bom_count:
                    type: integer
                  category:
                    type: string
                  description:
                    type: string
                  modes:
                    items:
                      type: object
                    type: array
                  name:
                    type: string
                  parameters:
                    items:
                      type: object
                    type: array
                  sku:
                    type: string
                  step_count:
                    type: integer
                  version:
                    type: string
                type: object
            type: object
        "400":
          description: Missing slug parameter
        "401":
          description: Unauthorized
        "502":
          description: Yantra4D unavailable
      security:
      - BearerAuth: []
      summary: Preview Yantra4D import
      tags:
      - yantra4d
securityDefinitions:
  BearerAuth:
