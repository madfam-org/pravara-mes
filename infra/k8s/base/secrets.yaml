# =============================================================================
# PravaraMES Secrets
# NOTE: In production, use external secrets management (Vault, AWS Secrets Manager, etc.)
# These are placeholder templates - actual secrets should be managed securely
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: pravara-db
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  username: pravara
  password: REPLACE_WITH_SECURE_PASSWORD
  # For external secrets operator:
  # secretsmanager.aws.amazon.com/secret-name: pravara-mes/db-credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-oidc
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  issuer: https://auth.janua.io/realms/madfam
  client_id: pravara-mes
  client_secret: REPLACE_WITH_OIDC_SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-auth
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  jwt_secret: REPLACE_WITH_JWT_SECRET
  nextauth_secret: REPLACE_WITH_NEXTAUTH_SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-mqtt
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  username: pravara-worker
  password: REPLACE_WITH_MQTT_PASSWORD
