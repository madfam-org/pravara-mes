# =============================================================================
# PravaraMES Secrets (Local Development Only)
# In production, these are overridden by ExternalSecret CRs in external-secrets/
# which pull from Vault via Enclii's ESO ClusterSecretStore.
# Vault paths: secret/data/pravara-mes/{db,oidc,auth,mqtt,centrifugo}
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: pravara-db
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  username: pravara
  password: REPLACE_WITH_SECURE_PASSWORD
  # For external secrets operator:
  # secretsmanager.aws.amazon.com/secret-name: pravara-mes/db-credentials
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-oidc
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  issuer: https://auth.janua.io/realms/madfam
  client_id: pravara-mes
  client_secret: REPLACE_WITH_OIDC_SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-auth
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  jwt_secret: REPLACE_WITH_JWT_SECRET
  nextauth_secret: REPLACE_WITH_NEXTAUTH_SECRET
  dhanam_webhook_secret: REPLACE_WITH_DHANAM_WEBHOOK_SECRET
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-mqtt
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  username: pravara-worker
  password: REPLACE_WITH_MQTT_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: pravara-centrifugo
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
type: Opaque
stringData:
  # HMAC secret for JWT token verification (must match CENTRIFUGO_TOKEN_SECRET in pravara-api)
  token_secret: REPLACE_WITH_CENTRIFUGO_TOKEN_SECRET
  # API key for server-to-server communication
  api_key: REPLACE_WITH_CENTRIFUGO_API_KEY
