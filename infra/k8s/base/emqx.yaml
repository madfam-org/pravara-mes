apiVersion: v1
kind: Service
metadata:
  name: emqx-pravara
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: emqx
    app.kubernetes.io/part-of: pravara-mes
spec:
  type: ClusterIP
  ports:
    - port: 1883
      targetPort: 1883
      name: mqtt
    - port: 8083
      targetPort: 8083
      name: ws
    - port: 8084
      targetPort: 8084
      name: wss
    - port: 18083
      targetPort: 18083
      name: dashboard
  selector:
    app.kubernetes.io/name: emqx
    app.kubernetes.io/part-of: pravara-mes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx-pravara
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: emqx
    app.kubernetes.io/part-of: pravara-mes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: emqx
      app.kubernetes.io/part-of: pravara-mes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: emqx
        app.kubernetes.io/part-of: pravara-mes
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: emqx
          image: emqx/emqx:5.4
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 8083
              name: ws
            - containerPort: 8084
              name: wss
            - containerPort: 18083
              name: dashboard
          env:
            - name: EMQX_NAME
              value: emqx
            - name: EMQX_HOST
              value: 127.0.0.1
            - name: EMQX_DASHBOARD__DEFAULT_USERNAME
              value: admin
            - name: EMQX_DASHBOARD__DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pravara-mqtt
                  key: password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /status
              port: 18083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /status
              port: 18083
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: emqx-data
              mountPath: /opt/emqx/data
      volumes:
        - name: emqx-data
          emptyDir: {}
