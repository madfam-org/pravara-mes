# =============================================================================
# PravaraMES Application Deployments & Services
# All application workloads (excluding infrastructure: postgres, redis, emqx, centrifugo)
# =============================================================================

# -----------------------------------------------------------------------------
# pravara-api — Control plane API (Go/Gin)
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pravara-api
  namespace: pravara-mes
  labels:
    app: pravara-api
    app.kubernetes.io/name: pravara-api
    app.kubernetes.io/part-of: pravara-mes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pravara-api
      app.kubernetes.io/name: pravara-api
  template:
    metadata:
      labels:
        app: pravara-api
        app.kubernetes.io/name: pravara-api
        app.kubernetes.io/part-of: pravara-mes
    spec:
      enableServiceLinks: false
      imagePullSecrets:
        - name: ghcr-credentials
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pravara-api
          image: pravara-api
          ports:
            - containerPort: 4500
              name: http
          envFrom:
            - configMapRef:
                name: pravara-config
            - secretRef:
                name: pravara-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /health
              port: 4500
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 4500
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4500
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: pravara-api
  namespace: pravara-mes
  labels:
    app: pravara-api
    app.kubernetes.io/name: pravara-api
    app.kubernetes.io/part-of: pravara-mes
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 4500
      name: http
  selector:
    app: pravara-api
    app.kubernetes.io/name: pravara-api

