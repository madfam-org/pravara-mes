# =============================================================================
# PravaraMES Secrets — TEMPLATE (NOT KUSTOMIZE-BUILT)
#
# This file is NOT listed in infra/k8s/base/kustomization.yaml because its
# values are literal REPLACE_WITH_* placeholders — applying it would write
# those literals as the cluster secret. Audit 2026-04-23 H11 flagged this.
#
# To populate the real secrets on a cluster, use one of:
#   1. `kubectl create secret generic pravara-secrets -n pravara-mes \
#        --from-literal=JWT_SECRET="$(openssl rand -hex 32)" ...`
#   2. Bootstrap via ExternalSecrets — see
#      infra/k8s/base/external-secrets/ for the ESO-managed equivalents.
#   3. SealedSecrets — encrypt this file with `kubeseal` before applying.
#
# CI guard: any occurrence of REPLACE_WITH_ outside *.example.yaml or
# tests/ should fail the build (see .github/workflows).
# =============================================================================

# Unified app secret — referenced by all app deployments via envFrom secretRef
apiVersion: v1
kind: Secret
metadata:
  name: pravara-secrets
  namespace: pravara-mes
type: Opaque
stringData:
  DATABASE_URL: "postgresql://pravara:REPLACE@postgres-pravara:5432/pravara_mes?sslmode=disable"
  REDIS_URL: "redis://redis-pravara:6379"
  MQTT_URL: "mqtt://emqx-pravara:1883"
  JWT_SECRET: "REPLACE_WITH_JWT_SECRET"
  NEXTAUTH_SECRET: "REPLACE_WITH_NEXTAUTH_SECRET"
  NEXTAUTH_URL: "https://mes.madfam.io"
  JANUA_ISSUER: "https://auth.madfam.io"
  JANUA_CLIENT_ID: "pravara-mes"
  JANUA_CLIENT_SECRET: "REPLACE_WITH_OIDC_SECRET"
  CENTRIFUGO_URL: "http://centrifugo:8000"
  CENTRIFUGO_API_KEY: "REPLACE_WITH_CENTRIFUGO_API_KEY"
  CENTRIFUGO_TOKEN_SECRET: "REPLACE_WITH_CENTRIFUGO_TOKEN_SECRET"
---
# PostgreSQL credentials — referenced by postgres StatefulSet
apiVersion: v1
kind: Secret
metadata:
  name: pravara-db
  namespace: pravara-mes
type: Opaque
stringData:
  username: pravara
  password: REPLACE_WITH_SECURE_PASSWORD
---
# EMQX MQTT credentials — referenced by emqx Deployment
apiVersion: v1
kind: Secret
metadata:
  name: pravara-mqtt
  namespace: pravara-mes
type: Opaque
stringData:
  username: pravara-worker
  password: REPLACE_WITH_MQTT_PASSWORD
---
# Centrifugo credentials — referenced by centrifugo Deployment
apiVersion: v1
kind: Secret
metadata:
  name: pravara-centrifugo
  namespace: pravara-mes
type: Opaque
stringData:
  token_secret: REPLACE_WITH_CENTRIFUGO_TOKEN_SECRET
  api_key: REPLACE_WITH_CENTRIFUGO_API_KEY
