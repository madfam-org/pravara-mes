apiVersion: v1
kind: Namespace
metadata:
  name: pravara-mes
  labels:
    app.kubernetes.io/name: pravara-mes
    app.kubernetes.io/part-of: pravara-mes
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pravara-quota
  namespace: pravara-mes
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: pravara-limits
  namespace: pravara-mes
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      type: Container
