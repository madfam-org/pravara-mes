# =============================================================================
# Centrifugo WebSocket Gateway
# Real-time event distribution for PravaraMES
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: centrifugo-config
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: centrifugo
    app.kubernetes.io/part-of: pravara-mes
data:
  config.json: |
    {
      "version": "5",
      "engine": "redis",
      "redis_address": "redis://redis-pravara:6379",
      "admin": false,
      "log_level": "info",
      "allowed_origins": ["https://mes.madfam.io", "http://localhost:4501"],
      "namespaces": [
        {
          "name": "machines",
          "publish": false,
          "subscribe": true,
          "presence": true,
          "join_leave": false,
          "history_size": 10,
          "history_ttl": "60s"
        },
        {
          "name": "tasks",
          "publish": false,
          "subscribe": true,
          "presence": false,
          "join_leave": false,
          "history_size": 20,
          "history_ttl": "120s"
        },
        {
          "name": "orders",
          "publish": false,
          "subscribe": true,
          "presence": false,
          "join_leave": false,
          "history_size": 10,
          "history_ttl": "60s"
        },
        {
          "name": "telemetry",
          "publish": false,
          "subscribe": true,
          "presence": false,
          "join_leave": false,
          "history_size": 0,
          "history_ttl": "0s"
        },
        {
          "name": "notifications",
          "publish": false,
          "subscribe": true,
          "presence": false,
          "join_leave": false,
          "history_size": 50,
          "history_ttl": "300s"
        }
      ],
      "proxy_connect_endpoint": "http://pravara-api:4500/v1/realtime/auth",
      "proxy_connect_timeout": "10s",
      "proxy_subscribe_endpoint": "http://pravara-api:4500/v1/realtime/subscribe",
      "proxy_subscribe_timeout": "10s"
    }
---
apiVersion: v1
kind: Service
metadata:
  name: centrifugo
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: centrifugo
    app.kubernetes.io/part-of: pravara-mes
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app.kubernetes.io/name: centrifugo
    app.kubernetes.io/part-of: pravara-mes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: centrifugo
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: centrifugo
    app.kubernetes.io/part-of: pravara-mes
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: centrifugo
      app.kubernetes.io/part-of: pravara-mes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: centrifugo
        app.kubernetes.io/part-of: pravara-mes
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: centrifugo
          image: centrifugo/centrifugo:v5
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8000
          args:
            - centrifugo
            - --config=/config/config.json
          env:
            - name: CENTRIFUGO_TOKEN_HMAC_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: pravara-centrifugo
                  key: token_secret
            - name: CENTRIFUGO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pravara-centrifugo
                  key: api_key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: centrifugo-config
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: centrifugo
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: centrifugo
    app.kubernetes.io/part-of: pravara-mes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: centrifugo
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
