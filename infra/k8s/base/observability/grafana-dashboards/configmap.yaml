apiVersion: v1
kind: ConfigMap
metadata:
  name: pravara-grafana-dashboards
  namespace: pravara-mes
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: pravara-mes
    app.kubernetes.io/component: monitoring
data:
  api-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(pravara_api_http_requests_total[5m])) by (status)",
              "legendFormat": "{{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "HTTP Request Rate by Tenant",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(pravara_api_http_requests_total[5m])) by (tenant_id)",
              "legendFormat": "{{tenant_id}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "P95 Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(pravara_api_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(pravara_api_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "title": "Error Rate (5xx)",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(pravara_api_http_requests_total{status=~\"5..\"}[5m])) / sum(rate(pravara_api_http_requests_total[5m]))",
              "legendFormat": "Error Rate"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "thresholds": { "steps": [{"color": "green", "value": null}, {"color": "yellow", "value": 0.01}, {"color": "red", "value": 0.05}] } }
          }
        },
        {
          "title": "DB Connections",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "pravara_api_db_connections_open",
              "legendFormat": "Open"
            },
            {
              "expr": "pravara_api_db_connections_in_use",
              "legendFormat": "In Use"
            },
            {
              "expr": "pravara_api_db_connections_idle",
              "legendFormat": "Idle"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["pravara-mes", "api"],
      "templating": {
        "list": [
          {
            "name": "tenant_id",
            "type": "query",
            "query": "label_values(pravara_api_http_requests_total, tenant_id)",
            "includeAll": true,
            "allValue": ".*"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "PravaraMES - API Overview",
      "uid": "pravara-api-overview"
    }
  telemetry-pipeline.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "MQTT Messages Received",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(pravara_telemetry_mqtt_messages_received_total[5m])) by (tenant_id)",
              "legendFormat": "{{tenant_id}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "msgps" } }
        },
        {
          "title": "MQTT Messages Processed",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(pravara_telemetry_mqtt_messages_processed_total[5m])) by (metric_type)",
              "legendFormat": "{{metric_type}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "msgps" } }
        },
        {
          "title": "Batch Size Distribution",
          "type": "histogram",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(pravara_telemetry_batch_size_bucket[5m])) by (le)",
              "legendFormat": "{{le}}"
            }
          ]
        },
        {
          "title": "Batch Write Latency (P95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(pravara_telemetry_batch_write_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "title": "Worker Queue Length",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "pravara_telemetry_worker_queue_length",
              "legendFormat": "Queue Length"
            }
          ]
        },
        {
          "title": "MQTT Connection Status",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "pravara_telemetry_mqtt_connection_status",
              "legendFormat": "Connection"
            }
          ],
          "fieldConfig": {
            "defaults": { "mappings": [{"type": "value", "options": {"0": {"text": "Disconnected", "color": "red"}, "1": {"text": "Connected", "color": "green"}}}] }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["pravara-mes", "telemetry"],
      "templating": {
        "list": [
          {
            "name": "tenant_id",
            "type": "query",
            "query": "label_values(pravara_telemetry_mqtt_messages_received_total, tenant_id)",
            "includeAll": true,
            "allValue": ".*"
          }
        ]
      },
      "time": { "from": "now-1h", "to": "now" },
      "title": "PravaraMES - Telemetry Pipeline",
      "uid": "pravara-telemetry-pipeline"
    }
  realtime-gateway.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "Client Connections",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "centrifugo_node_num_clients",
              "legendFormat": "Clients"
            }
          ]
        },
        {
          "title": "Channels",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "centrifugo_node_num_channels",
              "legendFormat": "Channels"
            }
          ]
        },
        {
          "title": "Messages Sent/Received",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "rate(centrifugo_node_num_messages_sent_total[5m])",
              "legendFormat": "Sent"
            },
            {
              "expr": "rate(centrifugo_node_num_messages_received_total[5m])",
              "legendFormat": "Received"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "msgps" } }
        }
      ],
      "schemaVersion": 39,
      "tags": ["pravara-mes", "realtime"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "PravaraMES - Real-Time Gateway",
      "uid": "pravara-realtime-gateway"
    }
