apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: centrifugo
  namespace: pravara-mes
  labels:
    app: centrifugo
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app: centrifugo
  endpoints:
    - port: internal
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_pod_node_name]
          targetLabel: node
  namespaceSelector:
    matchNames:
      - pravara-mes
