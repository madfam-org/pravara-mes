apiVersion: v1
kind: Service
metadata:
  name: postgres-pravara
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: pravara-mes
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: pravara-mes
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-pravara
  namespace: pravara-mes
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: pravara-mes
spec:
  serviceName: postgres-pravara
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: pravara-mes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: pravara-mes
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: pravara_mes
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pravara-db
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pravara-db
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pravara
                - -d
                - pravara_mes
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - pravara
                - -d
                - pravara_mes
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard
