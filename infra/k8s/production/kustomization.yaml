apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

# --- Infrastructure resource overrides ---
# --- Scale down centrifugo (single node, conserve resources) ---
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
  target:
    kind: StatefulSet
    name: postgres-pravara
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
  target:
    kind: Deployment
    name: redis-pravara
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  target:
    kind: Deployment
    name: emqx-pravara
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
  target:
    kind: HorizontalPodAutoscaler
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: centrifugo

# Pin upstream images by sha256 digest — Kyverno require-image-digest
# rejects tag-pinned refs in prod. Tag preserved in comment so future
# bumps know what stream to refresh from. Same fix landed in
# infra/k8s/base/{centrifugo,emqx}.yaml via PR #26 but the prod
# overlay's `images:` directive overrode the base references.
images:
- digest: sha256:90be10af3cb1c73c6b6cff8f6bcf02f8c0537d6aa1ed9f2cfe59a9e776a0c3d5
  name: centrifugo/centrifugo
  newName: docker.io/centrifugo/centrifugo
- digest: sha256:ca1a51d470ca667f7cc64ce77af7a7bb0e697223951f2880e9f74779fb651f1d
  name: emqx/emqx
  newName: docker.io/emqx/emqx
- name: postgres
  newName: docker.io/library/postgres
  newTag: 16-alpine
- digest: sha256:2eb57004a79924019f1b08a4af958eaa43659c1a1b79e7f76db94e5610411297
  name: pravara-admin
  newName: ghcr.io/madfam-org/pravara-admin
- digest: sha256:0dc1d65dd6e9cd0382fffc042d810f62e671acff2ff027e8e0a00f1b5e3cbc1c
  name: pravara-api
  newName: ghcr.io/madfam-org/pravara-api
- digest: sha256:a6653a0c7e4ecc5a857e2bbac9e5ac89031db434a3f822690b84fa87ef55b728
  name: pravara-gateway
  newName: ghcr.io/madfam-org/pravara-gateway
- digest: sha256:86b7f0abd7d55bdabe4131f42bc16a50aabba4a7206bf1a637571e3152207191
