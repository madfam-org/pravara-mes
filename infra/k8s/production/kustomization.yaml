apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pravara-mes

resources:
- ../base

# In production, ExternalSecret CRs (in base/external-secrets/) create the
# Kubernetes Secrets from Vault. The static secrets.yaml placeholders are
# kept for local dev but overridden by ESO's Owner creationPolicy.

  # Production-specific patches for higher resources
patches:
- patch: |-
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: postgres-pravara
    spec:
      template:
        spec:
          containers:
            - name: postgres
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 2000m
                  memory: 4Gi
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: redis-pravara
    spec:
      template:
        spec:
          containers:
            - name: redis
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: emqx-pravara
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: emqx
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi

configMapGenerator:
- behavior: merge
  literals:
  - environment=production
  name: pravara-config

images:
- name: centrifugo/centrifugo
  newName: docker.io/centrifugo/centrifugo
  newTag: v5
- name: emqx/emqx
  newName: docker.io/emqx/emqx
  newTag: "5.4"
- name: luban-bridge
  newName: ghcr.io/madfam-org/luban-bridge
  newTag: latest
- name: machine-adapter
  newName: ghcr.io/madfam-org/machine-adapter
  newTag: latest
- name: ml-orchestrator
  newName: ghcr.io/madfam-org/ml-orchestrator
  newTag: latest
- name: octoprint-connector
  newName: ghcr.io/madfam-org/octoprint-connector
  newTag: latest
- name: postgres
  newName: docker.io/library/postgres
  newTag: 16-alpine
- digest: sha256:4b59200bd552f4f7b39c646e8d1371c488f6f85cbe2081d12a02f7b64dc7250b
  name: pravara-api
  newName: ghcr.io/madfam-org/pravara-api
- name: pravara-ui
  newName: ghcr.io/madfam-org/pravara-ui
  newTag: main-acc524a
- name: redis
  newName: docker.io/library/redis
  newTag: 7-alpine
- digest: sha256:bb6204d8f51fa6ebbe7e5ef0bdd3342aa1cc623b3f979fac23d941eede5a8a56
  name: telemetry-worker
  newName: ghcr.io/madfam-org/telemetry-worker
- name: video-streaming
  newName: ghcr.io/madfam-org/video-streaming
  newTag: latest
- name: visualization-engine
  newName: ghcr.io/madfam-org/visualization-engine
  newTag: latest
