apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pravara-mes

resources:
- ../base

# In production, ExternalSecret CRs (in base/external-secrets/) create the
# Kubernetes Secrets from Vault. The static secrets.yaml placeholders are
# kept for local dev but overridden by ESO's Owner creationPolicy.

  # Production-specific patches for higher resources
patches:
- patch: |-
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: postgres-pravara
    spec:
      template:
        spec:
          containers:
            - name: postgres
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: 2000m
                  memory: 4Gi
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: redis-pravara
    spec:
      template:
        spec:
          containers:
            - name: redis
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: emqx-pravara
    spec:
      replicas: 1
      template:
        spec:
          containers:
            - name: emqx
              resources:
                requests:
                  cpu: 200m
                  memory: 512Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi

configMapGenerator:
- behavior: merge
  literals:
  - environment=production
  name: pravara-config

images:
- name: emqx/emqx
  newTag: "5.4"
- name: postgres
  newTag: 16-alpine
- name: pravara-api
  newName: ghcr.io/madfam-org/pravara-api
  newTag: main-2cc065b
- name: pravara-ui
  newName: ghcr.io/madfam-org/pravara-ui
  newTag: main-2cc065b
- name: redis
  newTag: 7-alpine
- name: telemetry-worker
  newName: ghcr.io/madfam-org/telemetry-worker
  newTag: main-ca85bb7
- name: visualization-engine
  newName: ghcr.io/madfam-org/visualization-engine
  newTag: latest
- name: video-streaming
  newName: ghcr.io/madfam-org/video-streaming
  newTag: latest
- name: ml-orchestrator
  newName: ghcr.io/madfam-org/ml-orchestrator
  newTag: latest
- name: luban-bridge
  newName: ghcr.io/madfam-org/luban-bridge
  newTag: latest
- name: octoprint-connector
  newName: ghcr.io/madfam-org/octoprint-connector
  newTag: latest
- name: machine-adapter
  newName: ghcr.io/madfam-org/machine-adapter
  newTag: latest
