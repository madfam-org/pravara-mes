apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

# --- Infrastructure resource overrides ---
# --- Scale down centrifugo (single node, conserve resources) ---
# --- Scale down non-core services (no images available) ---
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
  target:
    kind: StatefulSet
    name: postgres-pravara
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
  target:
    kind: Deployment
    name: redis-pravara
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  target:
    kind: Deployment
    name: emqx-pravara
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
  target:
    kind: HorizontalPodAutoscaler
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: visualization-engine
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: video-streaming
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: luban-bridge
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: octoprint-connector
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: machine-adapter

images:
- name: centrifugo/centrifugo
  newName: docker.io/centrifugo/centrifugo
  newTag: v5
- name: emqx/emqx
  newName: docker.io/emqx/emqx
  newTag: "5.4"
- name: luban-bridge
  newName: ghcr.io/madfam-org/luban-bridge
  newTag: latest
- name: machine-adapter
  newName: ghcr.io/madfam-org/machine-adapter
  newTag: latest
- name: octoprint-connector
  newName: ghcr.io/madfam-org/octoprint-connector
  newTag: latest
- name: postgres
  newName: docker.io/library/postgres
  newTag: 16-alpine
- digest: sha256:a97f71c18f1aea0b341e9d79828d1f010c10bf94ca48433df6cf3455f7434e3f
  name: pravara-admin
  newName: ghcr.io/madfam-org/pravara-admin
- digest: sha256:d6aa54be52e1cdfcdd6efbbb0b9d28eba4f54f7775a577ff5312c3b7f3294238
  name: pravara-api
  newName: ghcr.io/madfam-org/pravara-api
- digest: sha256:ad95c1c5319462876587db67be7af974d0df8f1e11df1a9bb40d04f29888a41f
  name: pravara-ui
  newName: ghcr.io/madfam-org/pravara-ui
- name: redis
  newName: docker.io/library/redis
  newTag: 7-alpine
- digest: sha256:1ed72703f3a1b1be7d19b09d85ed1e806cf5b8650a3f2e23585985c3d160447b
  name: telemetry-worker
  newName: ghcr.io/madfam-org/telemetry-worker
- name: video-streaming
  newName: ghcr.io/madfam-org/video-streaming
  newTag: latest
- name: visualization-engine
  newName: ghcr.io/madfam-org/visualization-engine
  newTag: latest
