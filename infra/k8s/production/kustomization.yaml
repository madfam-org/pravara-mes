apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

# --- Infrastructure resource overrides ---
# --- Scale down centrifugo (single node, conserve resources) ---
# --- Scale down non-core services (no images available) ---
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
  target:
    kind: StatefulSet
    name: postgres-pravara
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
  target:
    kind: Deployment
    name: redis-pravara
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  target:
    kind: Deployment
    name: emqx-pravara
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
  target:
    kind: HorizontalPodAutoscaler
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: visualization-engine
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: video-streaming
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: luban-bridge
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: octoprint-connector
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: machine-adapter

images:
- name: centrifugo/centrifugo
  newName: docker.io/centrifugo/centrifugo
  newTag: v5
- name: emqx/emqx
  newName: docker.io/emqx/emqx
  newTag: "5.4"
- name: luban-bridge
  newName: ghcr.io/madfam-org/luban-bridge
  newTag: latest
- name: machine-adapter
  newName: ghcr.io/madfam-org/machine-adapter
  newTag: latest
- name: octoprint-connector
  newName: ghcr.io/madfam-org/octoprint-connector
  newTag: latest
- name: postgres
  newName: docker.io/library/postgres
  newTag: 16-alpine
- name: pravara-api
  newName: ghcr.io/madfam-org/pravara-api
  newTag: latest
- digest: sha256:5d81c3893b9625c18babd7686db7daee15420e52a21b1f3e229915d744c546f6
  name: pravara-ui
  newName: ghcr.io/madfam-org/pravara-ui
- name: redis
  newName: docker.io/library/redis
  newTag: 7-alpine
- name: telemetry-worker
  newName: ghcr.io/madfam-org/telemetry-worker
  newTag: latest
- name: video-streaming
  newName: ghcr.io/madfam-org/video-streaming
  newTag: latest
- name: visualization-engine
  newName: ghcr.io/madfam-org/visualization-engine
  newTag: latest
