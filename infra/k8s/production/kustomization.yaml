apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../base

# --- Infrastructure resource overrides ---
# --- Scale down centrifugo (single node, conserve resources) ---
# --- Scale down non-core services (no images available) ---
patches:
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
  target:
    kind: StatefulSet
    name: postgres-pravara
- patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
  target:
    kind: Deployment
    name: redis-pravara
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 200m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
  target:
    kind: Deployment
    name: emqx-pravara
- patch: |-
    - op: replace
      path: /spec/minReplicas
      value: 1
    - op: replace
      path: /spec/maxReplicas
      value: 3
  target:
    kind: HorizontalPodAutoscaler
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: centrifugo
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: visualization-engine
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: video-streaming
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: luban-bridge
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: octoprint-connector
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 0
  target:
    kind: Deployment
    name: machine-adapter

images:
- name: centrifugo/centrifugo
  newName: docker.io/centrifugo/centrifugo
  newTag: v5
- name: emqx/emqx
  newName: docker.io/emqx/emqx
  newTag: "5.4"
- name: luban-bridge
  newName: ghcr.io/madfam-org/luban-bridge
  newTag: latest
- name: machine-adapter
  newName: ghcr.io/madfam-org/machine-adapter
  newTag: latest
- name: octoprint-connector
  newName: ghcr.io/madfam-org/octoprint-connector
  newTag: latest
- name: postgres
  newName: docker.io/library/postgres
  newTag: 16-alpine
- digest: sha256:3264237535cd5232befe527a124477dd6c6cd5ad528bddf366dc3122d9da6b84
  name: pravara-admin
  newName: ghcr.io/madfam-org/pravara-admin
- digest: sha256:0dc1d65dd6e9cd0382fffc042d810f62e671acff2ff027e8e0a00f1b5e3cbc1c
  name: pravara-api
  newName: ghcr.io/madfam-org/pravara-api
- digest: sha256:a6653a0c7e4ecc5a857e2bbac9e5ac89031db434a3f822690b84fa87ef55b728
  name: pravara-gateway
  newName: ghcr.io/madfam-org/pravara-gateway
- digest: sha256:761903ef253276ce9e827158b8aad31deb41f85c248b34de73d12c552d2b8e81
  name: pravara-ui
  newName: ghcr.io/madfam-org/pravara-ui
- name: redis
  newName: docker.io/library/redis
  newTag: 7-alpine
- digest: sha256:efb20781ba7c14b2882a1b6348cfbf25c64da32feebc48271b73f874d979394d
  name: telemetry-worker
  newName: ghcr.io/madfam-org/telemetry-worker
- name: video-streaming
  newName: ghcr.io/madfam-org/video-streaming
  newTag: latest
- name: visualization-engine
  newName: ghcr.io/madfam-org/visualization-engine
  newTag: latest
