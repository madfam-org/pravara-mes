# =============================================================================
# Build and Deploy Workflow
# Builds Docker images and deploys to enclii GitOps platform
# =============================================================================
name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - 'infra/k8s/production/kustomization.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  REGISTRY_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ===========================================================================
  # Detect Changes
  # ===========================================================================
  changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      pravara-api: ${{ steps.filter.outputs.pravara-api }}
      pravara-ui: ${{ steps.filter.outputs.pravara-ui }}
      pravara-gateway: ${{ steps.filter.outputs.pravara-gateway }}
      telemetry-worker: ${{ steps.filter.outputs.telemetry-worker }}
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check path filters
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            pravara-api:
              - 'apps/pravara-api/**'
              - 'packages/sdk-go/**'
              - 'go.work'
              - 'go.work.sum'
            pravara-ui:
              - 'apps/pravara-ui/**'
              - 'packages/ui-components/**'
            pravara-gateway:
              - 'apps/pravara-gateway/**'
            telemetry-worker:
              - 'apps/telemetry-worker/**'
              - 'packages/sdk-go/**'
              - 'go.work'
              - 'go.work.sum'

  # ===========================================================================
  # Build Go Services
  # ===========================================================================
  build-go:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.pravara-api == 'true' ||
      needs.changes.outputs.telemetry-worker == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - service: pravara-api
            context: .
            dockerfile: apps/pravara-api/Dockerfile
            image: pravara-api
            enabled: ${{ needs.changes.outputs.pravara-api }}
          - service: telemetry-worker
            context: .
            dockerfile: apps/telemetry-worker/Dockerfile
            image: telemetry-worker
            enabled: ${{ needs.changes.outputs.telemetry-worker }}
    outputs:
      pravara-api-digest: ${{ steps.digest.outputs.pravara-api }}
      telemetry-worker-digest: ${{ steps.digest.outputs.telemetry-worker }}

    steps:
      - name: Skip if not changed
        if: matrix.enabled != 'true'
        run: |
          echo "Service ${{ matrix.service }} has no changes, skipping build"
          exit 0

      - name: Checkout code
        if: matrix.enabled == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.enabled == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: matrix.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Extract Docker metadata
        if: matrix.enabled == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=PravaraMES ${{ matrix.service }}

      - name: Build and push Docker image
        if: matrix.enabled == 'true'
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
          platforms: linux/amd64

      - name: Install cosign
        if: matrix.enabled == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        if: matrix.enabled == 'true'
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY_IMAGE_PREFIX }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Output image digest
        if: matrix.enabled == 'true'
        id: digest
        run: echo "${{ matrix.service }}=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  # ===========================================================================
  # Build UI Service
  # ===========================================================================
  build-ui:
    name: Build pravara-ui
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.pravara-ui == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-ui
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=pravara-ui
            org.opencontainers.image.description=PravaraMES UI Application

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: apps/pravara-ui
          file: apps/pravara-ui/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://mes-api.madfam.io
            NEXT_PUBLIC_JANUA_URL=https://auth.madfam.io
            NPM_MADFAM_TOKEN=${{ secrets.NPM_MADFAM_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
          platforms: linux/amd64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-ui@${{ steps.build.outputs.digest }}

  # ===========================================================================
  # Build Gateway Service
  # ===========================================================================
  build-gateway:
    name: Build pravara-gateway
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.pravara-gateway == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-gateway
          tags: |
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=pravara-gateway
            org.opencontainers.image.description=PravaraMES API Gateway

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: apps/pravara-gateway
          file: apps/pravara-gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
          platforms: linux/amd64

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-gateway@${{ steps.build.outputs.digest }}

  # ===========================================================================
  # Commit Image Digests
  # ===========================================================================
  commit-digests:
    name: Commit Image Digests
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-go
      - build-ui
      - build-gateway
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-go.result == 'success' || needs.build-go.result == 'skipped') &&
      (needs.build-ui.result == 'success' || needs.build-ui.result == 'skipped') &&
      (needs.build-gateway.result == 'success' || needs.build-gateway.result == 'skipped')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MADFAM_BOT_PAT }}

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Commit image digests
        run: |
          git config user.name "madfam-bot"
          git config user.email "bot@madfam.dev"

          API_DIGEST="${{ needs.build-go.outputs.pravara-api-digest }}"
          WORKER_DIGEST="${{ needs.build-go.outputs.telemetry-worker-digest }}"
          UI_DIGEST="${{ needs.build-ui.outputs.digest }}"
          GATEWAY_DIGEST="${{ needs.build-gateway.outputs.digest }}"

          # Check if we have any digests to commit
          if [ -z "$API_DIGEST" ] && [ -z "$WORKER_DIGEST" ] && [ -z "$UI_DIGEST" ] && [ -z "$GATEWAY_DIGEST" ]; then
            echo "No digests to commit"
            exit 0
          fi

          for ATTEMPT in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main

            cd infra/k8s/production

            if [ -n "$API_DIGEST" ]; then
              kustomize edit set image pravara-api=${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-api@${API_DIGEST}
            fi

            if [ -n "$UI_DIGEST" ]; then
              kustomize edit set image pravara-ui=${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-ui@${UI_DIGEST}
            fi

            if [ -n "$GATEWAY_DIGEST" ]; then
              kustomize edit set image pravara-gateway=${{ env.REGISTRY_IMAGE_PREFIX }}/pravara-gateway@${GATEWAY_DIGEST}
            fi

            if [ -n "$WORKER_DIGEST" ]; then
              kustomize edit set image telemetry-worker=${{ env.REGISTRY_IMAGE_PREFIX }}/telemetry-worker@${WORKER_DIGEST}
            fi

            cd ../../..

            git add infra/k8s/production/kustomization.yaml
            git diff --staged --quiet && echo "No changes to commit" && exit 0
            git commit -m "deploy: update digests to ${GITHUB_SHA::8}"
            git push origin main && exit 0
            echo "Retry $ATTEMPT..."
            sleep $((ATTEMPT * 10))
          done
          echo "Failed after 3 attempts"
          exit 1

  # ===========================================================================
  # Report Lifecycle Events
  # ===========================================================================
  report-lifecycle:
    name: Report Lifecycle Events
    runs-on: ubuntu-latest
    needs:
      - changes
      - build-go
      - build-ui
      - build-gateway
    if: always()
    steps:
      - name: Report events
        run: |
          report_event() {
            local SERVICE="$1"
            local RESULT="$2"
            local DIGEST="$3"

            if [ -z "$RESULT" ] || [ "$RESULT" = "skipped" ]; then return; fi

            if [ "$RESULT" = "success" ]; then
              EVENT_TYPE="image_pushed"
            else
              EVENT_TYPE="build_failed"
            fi

            curl -sf -X POST "https://api.enclii.dev/v1/callbacks/lifecycle-event" \
              -H "Authorization: Bearer ${{ secrets.ENCLII_CALLBACK_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"repo_full_name\": \"madfam-org/pravara-mes\",
                \"commit_sha\": \"${{ github.sha }}\",
                \"branch\": \"${{ github.ref_name }}\",
                \"ref\": \"${{ github.ref }}\",
                \"event_type\": \"${EVENT_TYPE}\",
                \"source\": \"ci_callback\",
                \"message\": \"${SERVICE} ${EVENT_TYPE}\",
                \"metadata\": {
                  \"service\": \"${SERVICE}\",
                  \"image\": \"${{ env.REGISTRY_IMAGE_PREFIX }}/${SERVICE}\",
                  \"digest\": \"${DIGEST}\",
                  \"workflow\": \"build-deploy\",
                  \"actor\": \"${{ github.actor }}\"
                }
              }" || true
          }

          report_event "pravara-api" "${{ needs.build-go.result }}" "${{ needs.build-go.outputs.pravara-api-digest }}"
          report_event "telemetry-worker" "${{ needs.build-go.result }}" "${{ needs.build-go.outputs.telemetry-worker-digest }}"
          report_event "pravara-ui" "${{ needs.build-ui.result }}" "${{ needs.build-ui.outputs.digest }}"
          report_event "pravara-gateway" "${{ needs.build-gateway.result }}" "${{ needs.build-gateway.outputs.digest }}"
