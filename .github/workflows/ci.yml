name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  go-checks:
    name: Lint & Test (Go)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pravara
          POSTGRES_PASSWORD: test
          POSTGRES_DB: pravara_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            apps/pravara-api/go.sum
            apps/telemetry-worker/go.sum
            packages/sdk-go/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -short
        env:
          DATABASE_URL: postgres://pravara:test@localhost:5432/pravara_test?sslmode=disable
          REDIS_URL: redis://localhost:6379

  ui-checks:
    name: Lint & Typecheck (UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pravara-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/pravara-ui/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:run
        continue-on-error: true
