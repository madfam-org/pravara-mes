# =============================================================================
# Security Scanning Workflow
# Runs comprehensive security scans on PRs and scheduled daily scans
# =============================================================================
name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  # ===========================================================================
  # Go Security Analysis
  # ===========================================================================
  gosec:
    name: Go Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            apps/pravara-api/go.sum
            apps/telemetry-worker/go.sum
            packages/sdk-go/go.sum

      - name: Run gosec security scanner
        uses: securego/gosec@master
        with:
          args: '-fmt sarif -out gosec-results.sarif ./...'

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec-results.sarif

      - name: Gosec scan summary
        if: always()
        run: |
          echo "## Go Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Security scan completed. Check Security tab for detailed results." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # NPM Audit
  # ===========================================================================
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/pravara-ui
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/pravara-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=moderate --json > npm-audit-results.json || true
          npm audit --audit-level=moderate

      - name: Upload npm audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: apps/pravara-ui/npm-audit-results.json
          retention-days: 30

      - name: NPM audit summary
        if: always()
        run: |
          echo "## NPM Security Audit Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f npm-audit-results.json ]; then
            HIGH=$(jq '.metadata.vulnerabilities.high // 0' npm-audit-results.json)
            CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' npm-audit-results.json)
            echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
          fi

  # ===========================================================================
  # Container Image Scanning
  # ===========================================================================
  trivy-scan:
    name: Trivy Container Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - service: pravara-api
            context: .
            dockerfile: apps/pravara-api/Dockerfile
          - service: pravara-ui
            context: apps/pravara-ui
            dockerfile: apps/pravara-ui/Dockerfile
          - service: pravara-gateway
            context: apps/pravara-gateway
            dockerfile: apps/pravara-gateway/Dockerfile
          - service: telemetry-worker
            context: .
            dockerfile: apps/telemetry-worker/Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: sarif
          output: trivy-${{ matrix.service }}-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}-results.sarif
          category: trivy-${{ matrix.service }}

      - name: Run Trivy with table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Container scan summary
        if: always()
        run: |
          echo "## Container Scan - ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Trivy scan completed. Check Security tab for detailed results." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Filesystem Scanning
  # ===========================================================================
  trivy-fs:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
          scanners: vuln,secret,misconfig

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-filesystem

      - name: Run Trivy with table output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
          scanners: vuln,secret,misconfig

      - name: Filesystem scan summary
        if: always()
        run: |
          echo "## Filesystem Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Scan Types**: Vulnerabilities, Secrets, Misconfigurations" >> $GITHUB_STEP_SUMMARY
          echo "- **Severity Levels**: Critical, High" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check Security tab for detailed results." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Dependency Review (PR only)
  # ===========================================================================
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always

      - name: Dependency review summary
        if: always()
        run: |
          echo "## Dependency Review Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Dependency review completed." >> $GITHUB_STEP_SUMMARY
          echo "- **Fail on**: High severity vulnerabilities" >> $GITHUB_STEP_SUMMARY
          echo "- **Denied licenses**: GPL-3.0, AGPL-3.0" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Security Scan Summary
  # ===========================================================================
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs:
      - gosec
      - npm-audit
      - trivy-scan
      - trivy-fs
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go Security (gosec) | ${{ needs.gosec.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| NPM Audit | ${{ needs.npm-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container Scan (Trivy) | ${{ needs.trivy-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Filesystem Scan (Trivy) | ${{ needs.trivy-fs.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review detailed findings in the Security tab." >> $GITHUB_STEP_SUMMARY

      - name: Fail on critical issues
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ]; then
            echo "Critical security issues detected"
            exit 1
          fi
          echo "All security scans passed"
